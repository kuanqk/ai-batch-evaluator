services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: orleu_batch_evaluator
      POSTGRES_USER: orleu
      POSTGRES_PASSWORD: orleu_secret_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orleu -d orleu_batch_evaluator"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8502:8502"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8502 --workers 4 --timeout 120"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://orleu:orleu_secret_change_me@db:5432/orleu_batch_evaluator
      REDIS_URL: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./rubrics:/app/rubrics
      - ./media:/app/media
      - staticfiles:/app/staticfiles

  celery:
    build: .
    restart: unless-stopped
    command: >
      celery -A config worker
      --concurrency=5
      -Q evaluation,maintenance
      -l info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://orleu:orleu_secret_change_me@db:5432/orleu_batch_evaluator
      REDIS_URL: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./reports:/app/reports
      - ./rubrics:/app/rubrics
      - ./media:/app/media

volumes:
  postgres_data:
  redis_data:
  staticfiles:
